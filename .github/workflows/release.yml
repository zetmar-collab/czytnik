name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}   # ręczne uruchomienie testowe — buduje, ale nie publikuje

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalacja zależności
        run: npm ci

      - name: Testy (headless)
        run: |
          node test/make-samples.js
          node test/smoke.js

      - name: Budowanie instalatora
        run: npm run dist

      - name: Artefakt (uruchomienie testowe)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: instalator
          path: dist/Czytnik-Instalator-*.exe

      - name: Publikacja release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          name: Czytnik ${{ github.ref_name }}
          files: |
            dist/Czytnik-Instalator-*.exe
            dist/Czytnik-Instalator-*.exe.blockmap
          generate_release_notes: true
